# Strata model registry — the single source of truth for every downloadable ML
# model the Parallax Studio can use. Weights are NEVER bundled; the desktop shell
# fetches them on demand into %AppData%/strata/models/<id>/<file>.
#
# This file is embedded at build time (include_str!) and parsed at runtime, so a
# future "update model library" feature can simply replace it with a freshly
# fetched copy (same schema) without recompiling.
#
# Fields per entry:
#   id            unique slug; also the on-disk subdirectory (so identically named
#                 files like "model.onnx" never collide across models)
#   name          dropdown label
#   license       SPDX-ish string shown to the user
#   commercial_ok true if the license permits commercial use
#   size_mb       total download size (all files), for the UI
#   input_size    square model input resolution
#   invert        flip near/far (true when the model outputs larger = farther)
#   arch          depth only: "v2" (4-D input) or "v3" (5-D pixel_values input)
#   tier          depth only: small | base | large (GPU recommendation bucket)
#   files         ordered list; files[0] is the .onnx graph ORT loads, the rest
#                 (e.g. external "model.onnx_data") just sit alongside it

schema_version = 1

# ── Depth estimators ─────────────────────────────────────────────────────────

[[depth]]
id = "da3-small"
name = "Depth Anything V3 Small (99 MB · Apache)"
license = "Apache-2.0"
